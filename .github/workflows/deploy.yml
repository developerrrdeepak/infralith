name: Build and deploy Node.js app to Azure Web App - infralith

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x' # Matches the Node 22 version seen in your error log

      - name: npm install, build, and package standalone
        run: |
          npm install
          npm run build
          
          # The standalone output does not include the public and static directories
          # They need to be explicitly copied for the server to serve them
          cp -r public .next/standalone/ 2>/dev/null || true
          mkdir -p .next/standalone/.next/static
          cp -r .next/static/* .next/standalone/.next/static/ 2>/dev/null || true

      - name: Zip artifact for deployment
        run: |
          cd .next/standalone
          zip -r ../../release.zip .
          cd ../..

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'infralith'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_INFRALITH }}
          package: release.zip