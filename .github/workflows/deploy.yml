name: Build and Deploy Next.js to Azure

on:
  push:
    branches:
      - main # Change this if your default branch is 'master'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'your-app-name' # ⚠️ REPLACE THIS with your actual Azure App Service name
  NODE_VERSION: '22.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Next.js App
        run: npm run build

      - name: 🗂️ Prepare Standalone Deployment Package
        # Next.js 'standalone' output requires us to manually copy the static and public folders
        run: |
          echo "Assembling standalone payload..."
          mkdir -p deployment_package
          
          # 1. Copy the standalone server generated by Next.js
          cp -r .next/standalone/* deployment_package/
          
          # 2. Copy the static files 
          mkdir -p deployment_package/.next/static
          cp -r .next/static/* deployment_package/.next/static/
          
          # 3. Copy the public folder (if it exists)
          if [ -d "public" ]; then
            cp -r public deployment_package/
          fi

      - name: 🚀 Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deployment_package/