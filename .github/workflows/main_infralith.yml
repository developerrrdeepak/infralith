name: Build and deploy Node.js app to Azure Web App - infralith-epd3e7akbyf0a2ce

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: npm install, build
        run: |
          npm install --legacy-peer-deps
          npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT }}
          AZURE_DOCUMENT_INTELLIGENCE_KEY: ${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_KEY }}

      - name: Prepare standalone for deployment
        run: |
          # Create necessary directory inside standalone
          mkdir -p .next/standalone/.next/static
          
          # Copy static files if they exist
          if [ -d ".next/static" ]; then
            cp -r .next/static/* .next/standalone/.next/static/
          fi
          
          # Copy public folder if it exists
          if [ -d "public" ]; then
            mkdir -p .next/standalone/public
            cp -r public/* .next/standalone/public/
          fi
          
          # Create deployment package
          cd .next/standalone
          zip -r ../../release.zip .

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'infralith'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_3623F74E7A2942D4B05EB622D6E7F7CB }}
          package: release.zip

